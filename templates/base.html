<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Académie des Cours{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0d1b2a;
      --navy-mid:   #1a2e45;
      --navy-light: #243b55;
      --gold:       #c9a84c;
      --gold-light: #e2c97e;
      --gold-pale:  #f5ecd3;
      --cream:      #faf7f0;
      --text-dark:  #1a1a2e;
      --text-mid:   #4a5568;
      --white:      #ffffff;
      --error:      #c0392b;
      --success:    #1a6b3c;
      --radius:     10px;
      --shadow:     0 4px 24px rgba(13,27,42,0.12);
      --shadow-lg:  0 12px 48px rgba(13,27,42,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--navy);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .site-header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-emblem {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 1.3rem;
      color: var(--navy);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-weight: 600;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .logo-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
    }

    .header-nav { display: flex; gap: 8px; align-items: center; }

    .btn-nav {
      padding: 8px 18px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .btn-nav-ghost {
      color: var(--gold-light);
      border: 1px solid rgba(201,168,76,0.35);
    }
    .btn-nav-ghost:hover { background: rgba(201,168,76,0.12); }

    .btn-nav-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      font-weight: 600;
    }
    .btn-nav-gold:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── GOLD DIVIDER ── */
    .gold-rule {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border: none;
      margin: 0;
    }

    /* ── PAGE WRAPPER ── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── SECTION HEADING ── */
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--navy);
      text-align: center;
      margin-bottom: 0.4rem;
      line-height: 1.15;
    }

    .page-subtitle {
      text-align: center;
      color: var(--text-mid);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.02em;
    }

    .gold-accent {
      color: var(--gold);
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(201,168,76,0.15);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--navy), var(--navy-mid));
      padding: 1.2rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    .card-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .card-body { padding: 1.8rem; }

    /* ── FORM ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.4rem;
    }

    .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--navy-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    label .required { color: var(--gold); margin-left: 2px; }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text-dark);
      background: #fdfdfd;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
      background: #fff;
    }

    textarea { min-height: 80px; resize: vertical; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy);
      box-shadow: 0 4px 16px rgba(201,168,76,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.45); }

    .btn-navy {
      background: var(--navy);
      color: var(--white);
    }
    .btn-navy:hover { background: var(--navy-mid); transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 1.5px solid var(--gold);
    }
    .btn-outline:hover { background: rgba(201,168,76,0.08); }

    .btn-sm { padding: 7px 16px; font-size: 0.82rem; }
    .btn-danger { background: var(--error); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }

    /* ── DIVIDER ── */
    .section-divider {
      border: none;
      border-top: 1px solid rgba(201,168,76,0.2);
      margin: 1.5rem 0;
    }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-gold { background: var(--gold-pale); color: #7a5c1e; }
    .badge-navy { background: rgba(13,27,42,0.08); color: var(--navy); }

    /* ── FLASH / ALERT ── */
    .alert {
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      border-left: 4px solid;
    }
    .alert-error { background: #fdf2f2; border-color: var(--error); color: var(--error); }
    .alert-success { background: #f0faf5; border-color: var(--success); color: var(--success); }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--navy);
      text-align: center;
      padding: 1.5rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }
    .site-footer span { color: var(--gold); }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid.cols-3 { grid-template-columns: 1fr; }
      .page-title { font-size: 1.8rem; }
      .card-body { padding: 1.2rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<header class="site-header">
  <a href="/" class="logo">
    <div class="logo-emblem">A</div>
    <div class="logo-text">
      Académie
      <span class="logo-sub">Inscription aux cours</span>
    </div>
  </a>
  <nav class="header-nav">
    {% block nav %}
    <a href="/" class="btn-nav btn-nav-ghost">Accueil</a>
    <a href="/login" class="btn-nav btn-nav-gold">Espace admin</a>
    {% endblock %}
  </nav>
</header>
<hr class="gold-rule"/>

{% block content %}{% endblock %}

<footer class="site-footer">
  © 2025 Académie — Tous droits réservés &nbsp;·&nbsp; Développé avec <span>♥</span>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
