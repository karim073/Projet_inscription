<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Inscription au cours</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/validation.js"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>

<div class="container">

    <h2>Inscription au cours</h2>

    <form name="formInscription"
          action="/inscription"
          method="POST"
          onsubmit="return validerFormulaire()">

        <!-- Informations du tuteur -->
        <h3>Informations du tuteur</h3>

        <div class="form-group">
            <label for="nom_tuteur">Nom du tuteur</label>
            <input type="text" class="form-control" id="nom_tuteur" name="nom_tuteur" placeholder="Nom du tuteur" required>
        </div>

        <div class="form-group">
            <label for="prenom_tuteur">Prénom du tuteur</label>
            <input type="text" class="form-control" id="prenom_tuteur" name="prenom_tuteur" placeholder="Prénom du tuteur" required>
        </div>

        <div class="form-group">
            <label for="email_tuteur">Email du tuteur</label>
            <input type="email" class="form-control" id="email_tuteur" name="email_tuteur" placeholder="Email du tuteur" required>
        </div>

        <div class="form-group">
            <label for="tel_tuteur">Numéro de téléphone</label>
            <input type="tel" class="form-control" id="tel_tuteur" name="tel_tuteur" placeholder="Téléphone du tuteur" required>
        </div>

        <!-- Nombre d'enfants -->
        <div class="form-group">
            <label>Nombre d'enfants à inscrire</label>
            <select id="nb_enfants" onchange="genererFormulaires()">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
        </div>

        <!-- Champ caché pour Flask -->
        <input type="hidden" name="nb_enfants" id="nb_enfants_hidden">

        <!-- Zone où les formulaires enfants seront générés -->
        <div id="formulaires_enfants"></div>

        <br>

        <!-- ✅ reCAPTCHA v2 (case à cocher) -->
        <div class="g-recaptcha" data-sitekey="RECAPTCHA_SITE_KEY"></div>

        <br>
        <button type="submit">Envoyer l'inscription</button>
    </form>

    <script>
        function genererFormulaires() {
            const nb = parseInt(document.getElementById("nb_enfants").value);
            const container = document.getElementById("formulaires_enfants");
            const hiddenField = document.getElementById("nb_enfants_hidden");

            hiddenField.value = nb;
            container.innerHTML = "";

            for (let i = 1; i <= nb; i++) {
                const div = document.createElement("div");
                div.classList.add("form-group");

                div.innerHTML = `
                    <h4>Enfant ${i}</h4>

                    <label for="nom_enfant_${i}">Nom de l'enfant</label>
                    <input type="text" id="nom_enfant_${i}" name="nom_enfant_${i}" placeholder="Nom de l'enfant" required>

                    <label for="prenom_enfant_${i}">Prénom de l'enfant</label>
                    <input type="text" id="prenom_enfant_${i}" name="prenom_enfant_${i}" placeholder="Prénom de l'enfant" required>

                    <label for="cours_enfant_${i}">Niveau du cours</label>
                    <select id="cours_enfant_${i}" name="cours_enfant_${i}" required>
                        <option value="" disabled selected>-- Choisir un niveau --</option>
                        <option value="Élémentaire">Élémentaire</option>
                        <option value="Niveau 1">Niveau 1</option>
                        <option value="Niveau 2">Niveau 2</option>
                        <option value="Niveau 3">Niveau 3</option>
                    </select>

                    <label>
                        <input type="checkbox" id="has_allergies_${i}" onchange="toggleAllergies(${i})">
                        L'enfant a des allergies
                    </label>

                    <div id="allergies_container_${i}" style="display:none; margin-top:10px;">
                        <label for="allergies_enfant_${i}">Allergies éventuelles</label>
                        <input type="text" id="allergies_enfant_${i}" name="allergies_enfant_${i}" placeholder="Liste des allergies">
                    </div>
                `;

                container.appendChild(div);
            }
        }

        function toggleAllergies(i) {
            const checkbox = document.getElementById(`has_allergies_${i}`);
            const container = document.getElementById(`allergies_container_${i}`);
            container.style.display = checkbox.checked ? 'block' : 'none';
        }

        window.onload = genererFormulaires;
    </script>

</div>

</body>
</html>
